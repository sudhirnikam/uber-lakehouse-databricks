resources:
  pipelines:
    pipeline_landing_to_bronze:
      name: landing_to_bronze
      configuration:
        connection_string: "<placeholder for connection string>"
        raw_location: abfss://raw@${var.storage_account}.dfs.core.windows.net/ingestion/
        schema_location: abfss://raw@${var.storage_account}.dfs.core.windows.net/schema/
      libraries:
        - glob:
            include: ../../src/pipelines/landing_to_bronze/transformations/ingest_raw_files.py
        - glob:
            include: ../../src/pipelines/landing_to_bronze/transformations/ingest_event_hub.py
      schema: bronze
      photon: true
      catalog: ${var.catalog}
      serverless: true
      root_path:  ../../src/pipelines
