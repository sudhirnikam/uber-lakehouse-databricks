# This is a Databricks asset bundle definition for uber_lakehouse_asset_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: uber_lakehouse_asset_bundle
  uuid: 33331a5e-20f5-4d3b-ae6b-004b515e294b

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    presets:
      name_prefix: dev_${workspace.current_user.short_name}_
      source_linked_deployment: false
    workspace:
      host: https://adb-7405607910089212.12.azuredatabricks.net
    variables:
      catalog: uber_catalog
      schema: dev

  prod:
    mode: production
    workspace:
      host: https://adb-7405607910089212.12.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/d6184f58-e32d-4308-8d4b-de8e7ac27ca0 to make sure we only have a single copy.
      root_path: /Workspace/Users/d6184f58-e32d-4308-8d4b-de8e7ac27ca0/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: uber_catalog
      schema: prod
    permissions:
      - service_principal_name: d6184f58-e32d-4308-8d4b-de8e7ac27ca0
        level: CAN_MANAGE